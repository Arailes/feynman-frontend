<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Feynman AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 40px;
  text-align: center;
}

h1 {
  font-size: 32px;
  margin-bottom: 20px;
}

textarea {
  width: 100%;
  height: 180px;
  border-radius: 12px;
  padding: 15px;
  border: none;
  margin-bottom: 20px;
  font-size: 14px;
}

.buttons {
  display: flex;
  justify-content: center;
  gap: 10px;
}

button {
  padding: 12px 20px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #38bdf8, #0ea5e9);
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

.output {
  margin-top: 30px;
  background: #020617;
  padding: 20px;
  border-radius: 12px;
  text-align: left;
  white-space: pre-wrap;
}
</style>

</head>

<body>

<div class="container">

<h1>🧠 Feynman AI</h1>

<textarea id="input" placeholder="Cole seu conteúdo aqui..."></textarea>

<div class="buttons">
  <button onclick="generate()">Gerar Estudo</button>
  <button onclick="schedule()">Cronograma</button>
  <button onclick="subscribe()">Assinar</button>
</div>

<div id="output" class="output"></div>

</div>

<script src="app.js"></script>

</body>
</html>
